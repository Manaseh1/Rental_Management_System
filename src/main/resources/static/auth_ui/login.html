<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Rental System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
    <h2>Login</h2>
    <div id="statusBanner"></div>

    <!-- action must be /login, method must be POST — Spring Security intercepts this -->
    <form action="/login" method="post">
        <div class="form-group">
            <!-- Label is honest: accepts either. name="username" matches Spring Security config -->
            <label>Email or Username</label>
            <input type="text" name="username" placeholder="Enter your email or username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>

        <p class="switch">
            Don't have an account?
            <a href="register.html">Register</a>
        </p>
    </form>
</div>

<script src="./js/login.js"></script>
</body>
</html>
