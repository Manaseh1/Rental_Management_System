<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Rental System</title>
    <link rel="stylesheet" href="/auth_ui/style.css">
</head>
<body>

<div class="auth-container">
    <h2>Login</h2>

    <!-- Mirrors register's errorMessage element exactly -->
    <div id="errorMessage" class="error-message" aria-live="polite" hidden></div>

    <form id="loginForm" action="/login" method="post" novalidate>

        <div class="form-group">
            <label>Email or Username</label>
            <input type="text" name="username" placeholder="Enter your email or username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>

        <p class="switch">
            Don't have an account?
            <a href="/register">Register</a>
        </p>
    </form>
</div>

<script src="/auth_ui/js/login.js"></script>
</body>
</html>
