<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Rental System</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>


<div class="auth-container register">
    <div class="overlay">
    <h2>Register</h2>

    <form id="registerForm" action="/register" method="post" novalidate>
     <div id="errorMessage" class="error-message" aria-live="polite" hidden></div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password" minlength="6" required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirmPassword" placeholder="Confirm password" required>
        </div>


        <button type="submit">Register</button>

        <p class="switch">
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </form>
    </div>
</div>

<script>
    const errorCodes = {
        R001: 'Username is required.',
        R002: 'Email is invalid.',
        R003: 'Password must be at least 6 characters.',
        R004: 'Password and confirmation password do not match.',
        R005: 'This email is already registered.',
        R006: 'This username is already taken.',
        R007: 'Registration failed. Please try again.'
    };

    function getQueryParameter(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
    }

    function showError(code) {
        const message = errorCodes[code] || 'An unknown error occurred.';
        const errorElement = document.getElementById('errorMessage');
        errorElement.textContent = `${code}: ${message}`;
        errorElement.hidden = false;
        errorElement.classList.add('active');
    }

    document.addEventListener('DOMContentLoaded', () => {
        const serverError = getQueryParameter('error');
        if (serverError) {
            showError(serverError);
        }

        document.getElementById('registerForm').addEventListener('submit', (event) => {
            const password = document.querySelector('input[name="password"]').value;
            const confirmPassword = document.querySelector('input[name="confirmPassword"]').value;

            if (password.length < 6) {
                event.preventDefault();
                showError('R003');
                return;
            }

            if (password !== confirmPassword) {
                event.preventDefault();
                showError('R004');
            }
        });
    });
</script>

</body>
</html>
