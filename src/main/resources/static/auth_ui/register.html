<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Rental System</title>
    <link rel="stylesheet" href="/auth_ui/style.css">


</head>
<body>


<div class="auth-container register">
    <div class="overlay">
    <h2>Register</h2>

    <form id="registerForm" action="/register" method="post" novalidate>
     <div id="errorMessage" class="error-message" aria-live="polite" hidden></div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password" minlength="6" required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirmPassword" placeholder="Confirm password" required>
        </div>


        <button type="submit">Register</button>

        <p class="switch">
            Already have an account?
            <a href="/login">Login</a>
        </p>
    </form>
    </div>
</div>

<script src="/auth_ui/js/register.js">
</script>

</body>
</html>
